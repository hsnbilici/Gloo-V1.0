name: gloo
description: ASMR Jelly Color Puzzle Game — satisfying merge & sort mechanics
publish_to: 'none'
version: 1.0.0+116

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Animasyon
  flutter_animate: ^4.5.0

  # Durum yönetimi
  flutter_riverpod: ^2.5.1

  # Navigasyon
  go_router: ^13.2.0

  # Yardımcı
  equatable: ^2.0.5
  collection: ^1.18.0

  # Yerel depolama
  shared_preferences: ^2.3.2
  path_provider: ^2.1.2
  flutter_secure_storage: ^9.2.4

  # Paylaşım & Viral Pipeline
  share_plus: ^10.0.2
  # ffmpeg_kit_flutter_full_gpl: ^6.0.3    # FFmpeg video isleme — DISABLED: paket discontinued, GitHub release 404

  # Ses
  just_audio: ^0.9.40
  audio_session: ^0.1.16          # iOS audio session yönetimi

  # Monetizasyon — Faz 3
  google_mobile_ads: ^5.3.0       # AdMob (web uyumsuz — platform guard)
  in_app_purchase: ^3.2.0         # IAP & abonelik

  # Backend — Faz 3
  supabase_flutter: ^2.8.0        # Supabase BaaS

  # Firebase — Analytics & Crashlytics
  firebase_core: ^3.12.0
  firebase_analytics: ^11.4.0
  firebase_crashlytics: ^4.3.0

  # GDPR / ATT
  app_tracking_transparency: ^2.0.6
  user_messaging_platform: ^1.3.0          # UMP — AdMob GDPR consent (EEA/UK)

  # Native Splash Screen
  flutter_native_splash: ^2.4.0
  firebase_app_check: ^0.3.2+10

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4
  image: ^4.0.0
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true

  assets:
    # Ses dosyaları — OGG/MP3 dosyaları bu dizinlere eklenmeli
    - assets/audio/sfx/
    - assets/audio/music/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#010C14"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter_native_splash:
  color: "#010C14"
  android_12:
    color: "#010C14"
  web: true
  ios: true
  fullscreen: true
