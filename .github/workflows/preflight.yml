name: Pre-flight Validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        env:
          # ── Secrets under validation ────────────────────────────────────────
          FIREBASE_API_KEY_ANDROID: ${{ secrets.FIREBASE_API_KEY_ANDROID }}
          FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          # ── Run metadata (via env to avoid injection risk) ──────────────────
          RUN_ID: ${{ github.run_id }}
          ACTOR: ${{ github.actor }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          errors=0
          warnings=0

          echo "## Pre-flight Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** \`${RUN_ID}\` | **Triggered by:** \`${ACTOR}\` | **Ref:** \`${REF_NAME}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # ── Helper functions ────────────────────────────────────────────────
          pass() { echo "- [x] $1" >> $GITHUB_STEP_SUMMARY; echo "  PASS: $1"; }
          fail() { echo "- [ ] **FAIL:** $1" >> $GITHUB_STEP_SUMMARY; echo "  FAIL: $1"; errors=$((errors + 1)); }
          warn() { echo "- [ ] **WARN:** $1" >> $GITHUB_STEP_SUMMARY; echo "  WARN: $1"; warnings=$((warnings + 1)); }

          # ── Section 1: Secret presence checks ──────────────────────────────
          echo "### Secret Presence" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          check_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              fail "$name — missing or empty"
            else
              pass "$name — present"
            fi
          }

          check_secret "FIREBASE_API_KEY_ANDROID"         "$FIREBASE_API_KEY_ANDROID"
          check_secret "FIREBASE_APP_ID_ANDROID"          "$FIREBASE_APP_ID_ANDROID"
          check_secret "FIREBASE_MESSAGING_SENDER_ID"     "$FIREBASE_MESSAGING_SENDER_ID"
          check_secret "FIREBASE_PROJECT_ID"              "$FIREBASE_PROJECT_ID"
          check_secret "FIREBASE_STORAGE_BUCKET"          "$FIREBASE_STORAGE_BUCKET"
          check_secret "SUPABASE_URL"                     "$SUPABASE_URL"
          check_secret "SUPABASE_ANON_KEY"                "$SUPABASE_ANON_KEY"
          check_secret "GOOGLE_SERVICES_JSON_BASE64"      "$GOOGLE_SERVICES_JSON_BASE64"
          check_secret "GOOGLE_SERVICE_INFO_PLIST_BASE64" "$GOOGLE_SERVICE_INFO_PLIST_BASE64"
          check_secret "KEYSTORE_BASE64"                  "$KEYSTORE_BASE64"
          check_secret "KEYSTORE_PASSWORD"                "$KEYSTORE_PASSWORD"
          check_secret "KEY_PASSWORD"                     "$KEY_PASSWORD"
          check_secret "KEY_ALIAS"                        "$KEY_ALIAS"

          # ── Section 2: Format validation ────────────────────────────────────
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Format Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # SUPABASE_URL must start with https://
          if [ -n "$SUPABASE_URL" ]; then
            if [[ "$SUPABASE_URL" == https://* ]]; then
              pass "SUPABASE_URL — starts with https://"
            else
              fail "SUPABASE_URL — does not start with https://"
            fi
          else
            warn "SUPABASE_URL — skipped format check (secret missing)"
          fi

          # FIREBASE_PROJECT_ID must match ^[a-z0-9-]+$
          if [ -n "$FIREBASE_PROJECT_ID" ]; then
            if echo "$FIREBASE_PROJECT_ID" | grep -qE '^[a-z0-9-]+$'; then
              pass "FIREBASE_PROJECT_ID — matches pattern ^[a-z0-9-]+\$"
            else
              fail "FIREBASE_PROJECT_ID — invalid format (must be lowercase alphanumeric + hyphens)"
            fi
          else
            warn "FIREBASE_PROJECT_ID — skipped format check (secret missing)"
          fi

          # GOOGLE_SERVICES_JSON_BASE64 must decode to valid JSON
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            decoded=$(echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode 2>/dev/null) || true
            if [ -z "$decoded" ]; then
              fail "GOOGLE_SERVICES_JSON_BASE64 — base64 decode failed"
            elif echo "$decoded" | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null; then
              pass "GOOGLE_SERVICES_JSON_BASE64 — decodes to valid JSON"
            else
              fail "GOOGLE_SERVICES_JSON_BASE64 — decodes but is not valid JSON"
            fi
          else
            warn "GOOGLE_SERVICES_JSON_BASE64 — skipped format check (secret missing)"
          fi

          # GOOGLE_SERVICE_INFO_PLIST_BASE64 must decode to valid plist/XML
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST_BASE64" ]; then
            decoded_plist=$(echo "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode 2>/dev/null) || true
            if [ -z "$decoded_plist" ]; then
              fail "GOOGLE_SERVICE_INFO_PLIST_BASE64 — base64 decode failed"
            elif echo "$decoded_plist" | grep -q '<?xml\|<!DOCTYPE plist'; then
              pass "GOOGLE_SERVICE_INFO_PLIST_BASE64 — decodes to valid plist/XML"
            else
              warn "GOOGLE_SERVICE_INFO_PLIST_BASE64 — decoded but missing XML/DOCTYPE plist header"
            fi
          else
            warn "GOOGLE_SERVICE_INFO_PLIST_BASE64 — skipped format check (secret missing)"
          fi

          # KEYSTORE_BASE64 must decode to non-empty binary
          if [ -n "$KEYSTORE_BASE64" ]; then
            decoded_ks_bytes=$(echo "$KEYSTORE_BASE64" | base64 --decode 2>/dev/null | wc -c) || true
            if [ "$decoded_ks_bytes" -gt 0 ]; then
              pass "KEYSTORE_BASE64 — decodes to non-empty binary (${decoded_ks_bytes} bytes)"
            else
              fail "KEYSTORE_BASE64 — base64 decode produced empty output"
            fi
          else
            warn "KEYSTORE_BASE64 — skipped format check (secret missing)"
          fi

          # ── Final summary ───────────────────────────────────────────────────
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$errors" -eq 0 ] && [ "$warnings" -eq 0 ]; then
            echo "### Result: ALL CHECKS PASSED" >> $GITHUB_STEP_SUMMARY
            echo "All secrets are present and correctly formatted." >> $GITHUB_STEP_SUMMARY
            echo "RESULT: ALL CHECKS PASSED — ready for build."
          elif [ "$errors" -eq 0 ]; then
            echo "### Result: PASSED WITH WARNINGS" >> $GITHUB_STEP_SUMMARY
            echo "${warnings} warning(s) found — review before release builds." >> $GITHUB_STEP_SUMMARY
            echo "RESULT: PASSED WITH ${warnings} WARNING(S)"
          else
            echo "### Result: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "${errors} error(s) and ${warnings} warning(s) found — fix before running build workflows." >> $GITHUB_STEP_SUMMARY
            echo "RESULT: FAILED — ${errors} error(s), ${warnings} warning(s)"
            exit 1
          fi
