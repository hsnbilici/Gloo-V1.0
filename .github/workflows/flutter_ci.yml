name: Flutter CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  checks: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Check coverage threshold
        run: |
          # Parse lcov.info for line coverage
          TOTAL_LINES=$(grep -c '^DA:' coverage/lcov.info || echo 0)
          HIT_LINES=$(grep '^DA:' coverage/lcov.info | grep -cv ',0$' || echo 0)
          if [ "$TOTAL_LINES" -eq 0 ]; then
            echo "No coverage data found"
            exit 1
          fi
          COVERAGE=$((HIT_LINES * 100 / TOTAL_LINES))
          echo "Coverage: $COVERAGE% ($HIT_LINES/$TOTAL_LINES lines)"
          if [ "$COVERAGE" -lt 50 ]; then
            echo "::error::Coverage $COVERAGE% is below minimum threshold of 50%"
            exit 1
          fi
          echo "Coverage $COVERAGE% meets minimum threshold of 50%"

      - name: Check formatting
        run: dart format --set-exit-if-changed lib/ test/

  version-bump:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: analyze-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        run: ./scripts/version_bump.sh

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet pubspec.yaml && exit 0
          git add pubspec.yaml
          git commit -m "chore: bump build number [skip ci]"
          git push
