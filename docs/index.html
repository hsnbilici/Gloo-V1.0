<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gloo — ASMR Jelly Color Puzzle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0A0A0F;
      color: #E0E0E0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container { max-width: 480px; text-align: center; }
    h1 {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 6px;
      margin-bottom: 8px;
    }
    h1 span:first-child { color: #00E5FF; }
    h1 span:last-child { color: #FF6B6B; }
    .subtitle {
      color: #888;
      font-size: 0.75rem;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    .desc {
      color: #AAA;
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .links { display: flex; flex-direction: column; gap: 12px; }
    .links a {
      display: block;
      padding: 14px 24px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.3px;
      transition: transform 0.15s;
    }
    .links a:hover { transform: scale(1.02); }
    .links a.primary {
      background: rgba(0, 229, 255, 0.12);
      border: 1.5px solid rgba(0, 229, 255, 0.5);
      color: #00E5FF;
    }
    .links a.secondary {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #888;
    }
    footer {
      margin-top: 60px;
      color: #555;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span>Gl</span><span>oo</span></h1>
    <p class="subtitle">ASMR Jelly Color Puzzle</p>
    <p class="desc">
      Place, merge, and clear colorful gel shapes in this satisfying puzzle game.
      Discover color synthesis, master 50+ levels, and compete in real-time PvP duels.
    </p>
    <div class="links">
      <a href="privacy-policy.html" class="primary">Privacy Policy</a>
      <a href="terms-of-service.html" class="primary">Terms of Service</a>
      <a href="https://github.com/crewdev01-collab/Gloo-v1.0" class="secondary">GitHub</a>
    </div>
  </div>
  <footer>&copy; 2026 Gloo Studio. All rights reserved.</footer>
</body>
</html>
